<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | Dahal Event Planner</title>
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎉</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: var(--gradient-hero);
            color: white;
            padding: 2rem;
        }
        .error-emoji { font-size: 6rem; margin-bottom: 1rem; }
        .error-code {
            font-family: var(--font-display);
            font-size: 8rem;
            font-weight: 900;
            line-height: 1;
            background: linear-gradient(135deg, #f06292, #ffd700);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .error-title {
            font-family: var(--font-display);
            font-size: 2rem;
            margin: 1rem 0;
        }
        .error-text {
            color: rgba(255,255,255,0.7);
            max-width: 400px;
            margin: 0 auto 2rem;
        }
    </style>
</head>
<body>
    <div class="error-page">
        <div>
            <div class="error-emoji">🎈</div>
            <div class="error-code">404</div>
            <h1 class="error-title">This Party Moved!</h1>
            <p class="error-text">Looks like this page floated away like a balloon. Let's get you back to the celebration.</p>
            <a href="index.html" class="btn btn-primary btn-glow">Back to Home →</a>
        </div>
    </div>
</body>
</html>
